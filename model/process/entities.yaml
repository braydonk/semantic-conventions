groups:
  - id: entity.process
    type: entity
    stability: development
    name: process
    brief: >
        An operating system process.
    attributes:
      - ref: process.pid
        role: identifying
        requirement_level: required
        note: >
          If this entity is reported without another scoping entity - such as
          `process.linux.namespace.pid` - this PID is interpreted as the PID in
          the system's root scope (in Linux verbiage the
          "root/host pid_namespace").
      - ref: process.creation.time
        role: identifying
        requirement_level: required
      - ref: process.parent_pid
        role: descriptive
        requirement_level: opt_in
      - ref: process.command
        role: descriptive
        requirement_level: recommended
      - ref: process.command_line
        role: descriptive
        requirement_level: opt_in
      - ref: process.command_args
        role: descriptive
        requirement_level: opt_in
      - ref: process.args_count
        role: descriptive
        requirement_level: opt_in
      - ref: process.interactive
        role: descriptive
        requirement_level: opt_in
      - ref: process.title
        role: descriptive
        requirement_level: opt_in
      - ref: process.working_directory
        role: descriptive
        requirement_level: opt_in
      - ref: process.owner
        role: descriptive
        requirement_level: recommended
      - ref: process.linux.cgroup
        role: descriptive
        requirement_level: opt_in

  - id: entity.process.runtime
    type: entity
    stability: development
    name: process.runtime
    brief: >
      The single (language) runtime instance which is monitored.
    attributes:
      - ref: process.runtime.name
        role: identifying
      - ref: process.runtime.version
        role: identifying
      - ref: process.runtime.description
        role: descriptive

  - id: entity.process.linux.namespace.pid
    type: entity
    stability: development
    name: process.linux.namespace.pid
    brief: >
      A
      [pid namespace](https://man7.org/linux/man-pages/man7/pid_namespaces.7.html)
      on a Linux system.
    attributes:
      - ref: process.linux.namespace.pid.id
        role: identifying
        requirement_level: required

  - id: entity.process.executable
    type: entity
    stability: development
    name: process.executable
    brief: >
      The executable of a process.
    note: >
      Represents the executable file associated with a process.
      A single executable may be run my multiple process instances.
    attributes:
      - ref: process.executable.build_id.htlhash
        role: identifying
        requirement_level: required
      - ref: process.executable.path
        role: descriptive
        requirement_level: opt_in
      - ref: process.executable.build_id.go
        role: descriptive
        requirement_level: opt_in
      - ref: process.executable.build_id.gnu
        role: descriptive
        requirement_level: opt_in
      - ref: process.executable.name
        role: descriptive
        requirement_level: recommended
